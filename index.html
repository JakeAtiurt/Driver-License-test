<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แบบทดสอบใบขับขี่จักรยานยนต์ • 50 ข้อ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1ea;
    --ink: #1a1a1a;
    --paper: #faf7f0;
    --accent: #d63027;
    --accent-dark: #a8221c;
    --green: #2d7a4b;
    --amber: #e8a838;
    --line: #1a1a1a;
    --muted: #6b6b6b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'IBM Plex Sans Thai', 'Bai Jamjuree', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(214, 48, 39, 0.04) 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(45, 122, 75, 0.04) 0%, transparent 40%);
    padding: 2rem 1rem 4rem;
  }

  /* Subtle grain overlay */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.035;
    z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    position: relative;
    z-index: 2;
  }

  /* ===== HEADER ===== */
  .header {
    border: 2px solid var(--line);
    background: var(--paper);
    padding: 2rem 1.75rem 1.5rem;
    margin-bottom: 1.5rem;
    position: relative;
    box-shadow: 6px 6px 0 var(--line);
  }

  .header::before {
    content: "DLT • กรมการขนส่งทางบก";
    position: absolute;
    top: -10px;
    left: 20px;
    background: var(--bg);
    padding: 0 10px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .header h1 {
    font-family: 'Bai Jamjuree', sans-serif;
    font-weight: 700;
    font-size: clamp(1.6rem, 4.5vw, 2.2rem);
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin-bottom: 0.4rem;
  }

  .header h1 .accent {
    color: var(--accent);
  }

  .header .subtitle {
    font-size: 0.95rem;
    color: var(--muted);
    font-weight: 400;
  }

  .header-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    margin-top: 1.25rem;
    border-top: 1px solid var(--line);
    padding-top: 1rem;
  }

  .stat {
    text-align: center;
    border-right: 1px solid rgba(0,0,0,0.15);
    padding: 0.25rem 0;
  }

  .stat:last-child { border-right: none; }

  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    display: block;
  }

  .stat-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  /* ===== PROGRESS ===== */
  .progress-wrap {
    margin-bottom: 1.5rem;
    background: var(--paper);
    border: 2px solid var(--line);
    padding: 0.5rem;
    box-shadow: 4px 4px 0 var(--line);
  }

  .progress-bar {
    height: 8px;
    background: #e8e3d8;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }

  .progress-fill::after {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(255,255,255,0.2) 4px, rgba(255,255,255,0.2) 8px);
  }

  /* ===== QUESTION CARD ===== */
  .quiz-container {
    background: var(--paper);
    border: 2px solid var(--line);
    padding: 2rem 1.75rem;
    box-shadow: 6px 6px 0 var(--line);
    min-height: 400px;
  }

  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px dashed rgba(0,0,0,0.2);
  }

  .q-number {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    color: var(--muted);
  }

  .q-number strong {
    color: var(--accent);
    font-size: 1.1rem;
  }

  .q-category {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    padding: 0.25rem 0.6rem;
    border: 1px solid var(--line);
    background: var(--bg);
  }

  .question-text {
    font-size: 1.15rem;
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 1.5rem;
    color: var(--ink);
  }

  /* ===== CHOICES ===== */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .choice {
    display: flex;
    align-items: flex-start;
    gap: 0.85rem;
    padding: 0.9rem 1rem;
    background: var(--bg);
    border: 1.5px solid var(--line);
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
    font-family: inherit;
    font-size: 1rem;
    color: var(--ink);
    line-height: 1.5;
    width: 100%;
  }

  .choice:hover:not(:disabled) {
    background: var(--paper);
    transform: translateX(3px);
    box-shadow: -3px 0 0 var(--accent);
  }

  .choice:disabled { cursor: default; }

  .choice-letter {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border: 1.5px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 0.85rem;
    background: var(--paper);
  }

  .choice-text { flex: 1; padding-top: 2px; }

  /* States */
  .choice.correct {
    background: rgba(45, 122, 75, 0.12);
    border-color: var(--green);
    border-width: 2px;
  }
  .choice.correct .choice-letter {
    background: var(--green);
    color: white;
    border-color: var(--green);
  }

  .choice.wrong {
    background: rgba(214, 48, 39, 0.1);
    border-color: var(--accent);
    border-width: 2px;
  }
  .choice.wrong .choice-letter {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .choice.dimmed { opacity: 0.5; }

  /* ===== EXPLANATION ===== */
  .explanation {
    margin-top: 1.25rem;
    padding: 1rem 1.1rem;
    background: var(--bg);
    border-left: 4px solid var(--amber);
    font-size: 0.95rem;
    line-height: 1.55;
    animation: slideIn 0.3s ease;
  }

  .explanation strong {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber);
    display: block;
    margin-bottom: 0.4rem;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== CONTROLS ===== */
  .controls {
    display: flex;
    justify-content: space-between;
    gap: 0.75rem;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px dashed rgba(0,0,0,0.2);
  }

  .btn {
    padding: 0.75rem 1.5rem;
    font-family: 'Bai Jamjuree', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    border: 2px solid var(--line);
    background: var(--paper);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }

  .btn:hover:not(:disabled) {
    background: var(--ink);
    color: var(--paper);
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0 var(--accent);
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-primary:hover:not(:disabled) {
    background: var(--accent-dark);
    color: white;
    box-shadow: 4px 4px 0 var(--line);
  }

  /* ===== RESULTS ===== */
  .results {
    display: none;
    text-align: center;
    padding: 2rem 1rem 1rem;
  }

  .results.active { display: block; animation: fadeIn 0.5s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }

  .result-badge {
    display: inline-block;
    padding: 0.4rem 1rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--paper);
    margin-bottom: 1rem;
  }

  .result-score {
    font-family: 'Bai Jamjuree', sans-serif;
    font-size: clamp(3.5rem, 10vw, 5rem);
    font-weight: 700;
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .result-fraction {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .result-status {
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    padding: 0.75rem;
    border: 2px solid var(--line);
  }

  .result-status.pass { background: rgba(45, 122, 75, 0.15); color: var(--green); }
  .result-status.fail { background: rgba(214, 48, 39, 0.1); color: var(--accent); }

  .result-breakdown {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .breakdown-item {
    padding: 1rem;
    border: 1.5px solid var(--line);
    background: var(--bg);
  }

  .breakdown-item .num {
    font-family: 'Space Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    display: block;
  }

  .breakdown-item .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .breakdown-item.correct .num { color: var(--green); }
  .breakdown-item.wrong .num { color: var(--accent); }

  /* ===== FOOTER ===== */
  .footer {
    text-align: center;
    margin-top: 2rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Mobile */
  @media (max-width: 520px) {
    body { padding: 1rem 0.75rem 3rem; }
    .header, .quiz-container { padding: 1.5rem 1.1rem; box-shadow: 4px 4px 0 var(--line); }
    .question-text { font-size: 1.05rem; }
    .choice { padding: 0.75rem 0.85rem; font-size: 0.95rem; }
    .controls { flex-direction: column-reverse; }
    .controls .btn { width: 100%; }
    .result-breakdown { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <span>FORM № 05-MC/50</span>
      <span>ประเภท: รถจักรยานยนต์</span>
    </div>
    <h1>แบบทดสอบ<br><span class="accent">ใบขับขี่รถจักรยานยนต์</span></h1>
    <p class="subtitle">เลือกคำตอบที่ถูกต้องที่สุด • เกณฑ์ผ่าน 90% (45/50 ข้อ)</p>
    <div class="header-stats">
      <div class="stat">
        <span class="stat-num">50</span>
        <span class="stat-label">ข้อ</span>
      </div>
      <div class="stat">
        <span class="stat-num">90%</span>
        <span class="stat-label">เกณฑ์ผ่าน</span>
      </div>
      <div class="stat">
        <span class="stat-num">4</span>
        <span class="stat-label">ตัวเลือก</span>
      </div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="quiz-container" id="quizContainer">
    <div id="questionArea"></div>

    <div class="controls">
      <button class="btn" id="prevBtn" onclick="prevQuestion()">← ก่อนหน้า</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">ข้อถัดไป →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="quiz-container results" id="resultsArea">
    <span class="result-badge">ผลการทดสอบ</span>
    <div class="result-score" id="scorePercent">0%</div>
    <div class="result-fraction" id="scoreFraction">0 / 50</div>
    <div class="result-status" id="resultStatus"></div>

    <div class="result-breakdown">
      <div class="breakdown-item correct">
        <span class="num" id="correctCount">0</span>
        <span class="label">ตอบถูก</span>
      </div>
      <div class="breakdown-item wrong">
        <span class="num" id="wrongCount">0</span>
        <span class="label">ตอบผิด</span>
      </div>
    </div>

    <button class="btn btn-primary" onclick="restart()" style="width: 100%;">เริ่มทดสอบใหม่</button>
  </div>

  <div class="footer">
    อ้างอิงหลักสูตรกรมการขนส่งทางบก • สำหรับฝึกฝนเท่านั้น
  </div>
</div>

<script>
// ========================================
// 50 QUESTIONS - ใบขับขี่จักรยานยนต์
// ========================================
const questions = [
  // === หมวด 1: กฎจราจร ===
  {
    q: "ผู้ขับขี่รถจักรยานยนต์ต้องมีอายุตามกฎหมายเท่าใด?",
    choices: ["15 ปีบริบูรณ์ สำหรับรถจักรยานยนต์ไม่เกิน 110 ซีซี", "17 ปีบริบูรณ์ สำหรับรถจักรยานยนต์ทุกประเภท", "18 ปีบริบูรณ์ทุกกรณี", "อายุ 20 ปีบริบูรณ์"],

    explain: "รถจักรยานยนต์ส่วนบุคคล: 15 ปีบริบูรณ์ขึ้นไป (ไม่เกิน 110 ซีซี) และ 18 ปีบริบูรณ์สำหรับรถเกิน 110 ซีซี"
  },
  {
    q: "สัญญาณไฟจราจรสีเหลืองหมายถึงอะไร?",
    choices: ["ให้หยุดทันที", "ให้เตรียมหยุด เว้นแต่ได้เลยเส้นหยุดไปแล้ว", "ให้ขับต่อไปได้", "ให้ขับด้วยความระมัดระวังเป็นพิเศษ"],
    answer: 1,

    explain: "ไฟเหลือง = เตรียมหยุดก่อนถึงเส้นหยุด แต่ถ้าเลยเส้นหยุดไปแล้วให้ขับผ่านไปได้อย่างระมัดระวัง"
  },
  {
    q: "เมื่อเจอสัญญาณไฟแดง ผู้ขับขี่ต้องทำอย่างไร?",

    answer: 0,
    cat: "กฎจราจร",
    explain: "ไฟแดงต้องหยุดหลังเส้นหยุดเสมอ การเลี้ยวซ้ายผ่านแดงทำได้เฉพาะเมื่อมีป้าย 'เลี้ยวซ้ายผ่านตลอด' เท่านั้น"
  },
  {
    q: "การขับขี่รถจักรยานยนต์บนทางหลวง ผู้ขับและผู้โดยสารต้องทำอย่างไร?",
    choices: ["สวมหมวกนิรภัยทั้งผู้ขับและผู้โดยสาร", "สวมหมวกเฉพาะผู้ขับขี่", "สวมหมวกเฉพาะตอนขับทางไกล", "ไม่บังคับหากขับช้า"],
    answer: 0,
    cat: "กฎหมาย",
    explain: "กฎหมายบังคับให้ทั้งผู้ขับและผู้ซ้อนท้ายต้องสวมหมวกนิรภัยที่ได้มาตรฐาน มอก. ตลอดเวลา"

  {

  {
    q: "ผู้ขับขี่ที่ดื่มสุราแล้วขับขี่ มีปริมาณแอลกอฮอล์ในเลือดเกินเท่าใดถือว่าเมาแล้วขับ?",

  {

    explain: "ป้ายหยุดต้องหยุดรถให้สนิทก่อนเส้นหยุด มองดูความปลอดภัยรอบด้าน แล้วจึงเคลื่อนต่อได้"
  },
  {
    q: "การใช้โทรศัพท์มือถือขณะขับขี่รถจักรยานยนต์ทำได้เมื่อใด?",
    choices: ["ทำได้ทุกกรณี", "ทำได้เฉพาะรับสายสั้นๆ", "ทำได้เฉพาะใช้บลูทูธหรือแฮนด์ฟรี", "ห้ามโดยเด็ดขาดทุกกรณี"],
    answer: 2,
    cat: "กฎหมาย",
    explain: "ห้ามถือโทรศัพท์ขับขี่ ใช้ได้เฉพาะอุปกรณ์แฮนด์ฟรีหรือบลูทูธ ผู้ฝ่าฝืนปรับ 400-1,000 บาท"

// ========================================
// STATE
// ========================================
let currentQ = 0;
let answers = new Array(questions.length).fill(null);
let answered = new Array(questions.length).fill(false);

// ========================================
// RENDER
// ========================================
function renderQuestion() {
  const q = questions[currentQ];
  const area = document.getElementById('questionArea');

  const isAnswered = answered[currentQ];
  const userAnswer = answers[currentQ];

  let choicesHTML = q.choices.map((choice, i) => {
    let cls = 'choice';
    if (isAnswered) {
      if (i === q.answer) cls += ' correct';
      else if (i === userAnswer) cls += ' wrong';
      else cls += ' dimmed';
    }
    const letter = ['ก', 'ข', 'ค', 'ง'][i];
    return `
      <button class="${cls}" ${isAnswered ? 'disabled' : ''} onclick="selectAnswer(${i})">
        <span class="choice-letter">${letter}</span>
        <span class="choice-text">${choice}</span>
      </button>
    `;
  }).join('');

  let explanationHTML = '';
  if (isAnswered) {
    explanationHTML = `
      <div class="explanation">
        <strong>คำอธิบาย</strong>
        ${q.explain}
      </div>
    `;
  }

  area.innerHTML = `
    <div class="q-meta">
      <div class="q-number">ข้อที่ <strong>${currentQ + 1}</strong> / ${questions.length}</div>
      <div class="q-category">${q.cat}</div>
    </div>
    <div class="question-text">${q.q}</div>
    <div class="choices">${choicesHTML}</div>
    ${explanationHTML}
  `;

  // Update progress
  const answeredCount = answered.filter(a => a).length;
  document.getElementById('progressFill').style.width = `${(answeredCount / questions.length) * 100}%`;

  // Update buttons
  document.getElementById('prevBtn').disabled = currentQ === 0;
  const nextBtn = document.getElementById('nextBtn');

  if (currentQ === questions.length - 1) {
    nextBtn.textContent = 'ดูผลการทดสอบ';
  } else {
    nextBtn.textContent = 'ข้อถัดไป →';
  }

  // Scroll to top of question smoothly
  document.getElementById('quizContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function selectAnswer(index) {
  if (answered[currentQ]) return;
  answers[currentQ] = index;
  answered[currentQ] = true;
  renderQuestion();
}

function nextQuestion() {
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showResults();
  }
}

function prevQuestion() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

function showResults() {
  document.getElementById('quizContainer').style.display = 'none';
  document.getElementById('resultsArea').classList.add('active');

  let correct = 0;
  answers.forEach((a, i) => {
    if (a === questions[i].answer) correct++;
  });

  const wrong = questions.length - correct;
  const percent = Math.round((correct / questions.length) * 100);

  document.getElementById('scorePercent').textContent = percent + '%';
  document.getElementById('scoreFraction').textContent = `${correct} / ${questions.length} ข้อ`;
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;

  const status = document.getElementById('resultStatus');
  if (percent >= 90) {
    status.textContent = '🎉 ผ่าน! คุณพร้อมสอบใบขับขี่แล้ว';
    status.className = 'result-status pass';
  } else if (percent >= 70) {
    status.textContent = '⚠️ ใกล้เคียง - ทบทวนเพิ่มอีกนิด';
    status.className = 'result-status fail';
  } else {
    status.textContent = '📚 ยังไม่ผ่าน - ควรทบทวนเพิ่มเติม';
    status.className = 'result-status fail';
  }

  // Progress bar full
  document.getElementById('progressFill').style.width = '100%';
}

function restart() {
  currentQ = 0;
  answers = new Array(questions.length).fill(null);
  answered = new Array(questions.length).fill(false);
  document.getElementById('resultsArea').classList.remove('active');
  document.getElementById('quizContainer').style.display = 'block';
  renderQuestion();
}

// Init
renderQuestion();
</script>
